<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión – Chinchintirapie</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Pacifico&family=Nunito:wght@400;600;700;800&family=Bangers&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../asset/css/styles.css">
</head>

<body class="auth-page">

  <main class="auth-container">
    <div class="auth-modal-box auth-standalone">

      <div class="auth-modal-header">
        <a href="../index.html">
          <img src="../asset/img/logo-chinchitirapie.png" alt="Logo" class="auth-logo-img">
        </a>
        <h1 class="auth-modal-title">Iniciar Sesión</h1>
        <p class="auth-modal-subtitle">Escuela Carnavalera</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="location.href='login.html'">Entrar</button>
      </div>

      <div class="auth-panel">
        <form class="portal-form" id="loginForm" novalidate>
          <div class="form-group">
            <label for="login-email">Correo Electrónico</label>
            <input type="email" id="login-email" placeholder="ejemplo@correo.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="login-pass">Contraseña</label>
            <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" required>
          </div>
          <div class="form-aux">
            <label class="remember-label">
              <input type="checkbox" id="login-remember"> Recordarme
            </label>
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
          </div>
          <button type="submit" class="portal-btn">Entrar</button>
        </form>
        <div class="auth-footer">
          <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
        </div>
      </div>

    </div>
  </main>

  <script src="../asset/js/main.js"></script>
  <script src="../asset/js/auth-pages.js"></script>
</body>

</html>
